<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Multimedia</title>
  </head>
  <body>
    <video controls width="600px" height="600px">
      <source
        src="https://youtu.be/5ipHezg75Jc?si=V81gollu73CPAzGT"
        type="video/mp4"
      />
    </video>
    <br />
    <audio controls width="600px" height="600px">
      <source
        src="https://youtu.be/5ipHezg75Jc?si=V81gollu73CPAzGT"
        type="audio/mp3"
      />
    </audio>
    <br />
    <iframe
      width="560"
      height="315"
      src="https://www.youtube.com/embed/vB8i-ubsdPM?si=9SwB7VUzHp0PG5qr"
      title="YouTube video player"
      frameborder="0"
      allow="
        accelerometer;
        autoplay;
        clipboard-write;
        encrypted-media;
        gyroscope;
        picture-in-picture;
        web-share;
      "
      referrerpolicy="strict-origin-when-cross-origin"
      allowfullscreen
    ></iframe>
  </body>
</html>
