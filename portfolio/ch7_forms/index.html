<!-- PERSONAL INFO -->

<fieldset>
  <legend>Personal Information</legend>

  <div class="row">
    <div class="form-group">
      <label>First Name</label>
      <input type="text" placeholder="Enter first name" value="James" />
    </div>

    <div class="form-group">
      <label>Last Name</label>
      <input type="text" placeholder="Enter last name" value="Walker" />
    </div>
  </div>

  <div class="row">
    <div class="form-group">
      <label>Email</label>
      <input
        type="email"
        placeholder="Enter email"
        value="james.walker@military.gov"
      />
    </div>

    <div class="form-group">
      <label>Password</label>
      <input type="password" placeholder="Enter password" value="Soldier123" />
    </div>
  </div>

  <div class="row">
    <div class="form-group">
      <label>Phone Number</label>
      <input
        type="tel"
        placeholder="Enter phone number"
        value="+1 555 876 4321"
      />
    </div>

    <div class="form-group">
      <label>Age</label>
      <input type="number" value="29" />
    </div>
  </div>

  <div class="row">
    <div class="form-group">
      <label>Date of Birth</label>
      <input type="date" value="1997-04-15" />
    </div>

    <div class="form-group">
      <label>Upload Photo</label>
      <input type="file" />
    </div>
  </div>

  <div class="form-group">
    <label>Biography</label>

    <textarea>
Experienced infantry soldier with 8 years of active duty service.
    </textarea>
  </div>
</fieldset>

<!-- MILITARY DETAILS -->

<fieldset>
  <legend>Military Details</legend>

  <div class="row">
    <div class="form-group">
      <label>Military ID</label>

      <input type="text" value="MIL-2026-784" />
    </div>

    <div class="form-group">
      <label>Rank</label>

      <select>
        <option>Private</option>
        <option>Corporal</option>
        <option selected>Sergeant</option>
        <option>Captain</option>
      </select>
    </div>
  </div>

  <div class="form-group">
    <label>Division</label>

    <input list="division-list" value="Infantry" />

    <datalist id="division-list">
      <option value="Infantry"></option>
      <option value="Navy"></option>
      <option value="Air Force"></option>
    </datalist>
  </div>

  <div class="form-group">
    <label>Availability</label>

    <div class="radio-group">
      <label>
        <input type="radio" name="status" checked />
        Active
      </label>

      <label>
        <input type="radio" name="status" />
        Reserve
      </label>
    </div>
  </div>
</fieldset>

<!-- EQUIPMENT -->

<fieldset>
  <legend>Equipment Information</legend>

  <div class="row">
    <div class="form-group">
      <label>Equipment Name</label>

      <input type="text" value="M4 Assault Rifle" />
    </div>

    <div class="form-group">
      <label>Quantity</label>

      <input type="number" value="2" />
    </div>
  </div>

  <div class="form-group">
    <label>Assigned Equipment</label>

    <div class="checkbox-group">
      <label>
        <input type="checkbox" checked />
        Helmet
      </label>

      <label>
        <input type="checkbox" checked />
        Rifle
      </label>

      <label>
        <input type="checkbox" />
        Armor
      </label>
    </div>
  </div>

  <div class="form-group">
    <label>Equipment Condition</label>

    <progress value="70" max="100"></progress>
  </div>
</fieldset>

<!-- BUTTONS -->

<div class="buttons">
  <button class="submit-btn" type="submit">Register</button>

  <button class="reset-btn" type="reset">Reset</button>
</div>
